<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LSD Trading Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0b1220;
color:#fff;
height:100vh;
overflow:hidden;
}

.wrapper{
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:#111827;
border-right:1px solid #1f2937;
padding:20px;
overflow:auto;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
text-align:center;
}

.card{
background:#1f2937;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.card h3{
margin-bottom:10px;
}

.signal{
font-size:40px;
font-weight:bold;
text-align:center;
padding:15px;
border-radius:10px;
}

.buy{
background:#064e3b;
color:#10b981;
}

.sell{
background:#7f1d1d;
color:#ef4444;
}

.wait{
background:#374151;
color:#facc15;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.stats div{
text-align:center;
}

.chart{
flex:1;
}

#tradingview_chart{
width:100%;
height:100%;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.btn-buy{
background:#10b981;
color:white;
}

.btn-sell{
background:#ef4444;
color:white;
}

.btn-neutral{
background:#374151;
color:white;
}

</style>
</head>
<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">
LSD TRADER
</div>

<div class="card">

<h3>Status Sinyal</h3>

<div id="signalBox" class="signal wait">
WAIT
</div>

</div>

<div class="card">

<h3>Statistik</h3>

<div class="stats">
<div>
<h2 id="win">0</h2>
<p>Win</p>
</div>

<div>
<h2 id="loss">0</h2>
<p>Loss</p>
</div>

<div>
<h2 id="wr">0%</h2>
<p>WR</p>
</div>
</div>

</div>

<div class="card">

<h3>Aksi</h3>

<button class="btn btn-buy">
BUY
</button>

<button class="btn btn-sell">
SELL
</button>

<button class="btn btn-neutral">
RESET
</button>

</div>

<div class="card">

<h3>Info LSD</h3>

<!-- <p>
Tempel script Liquidity Shift Detection ke Pine Editor TradingView.
</p> -->

</div>

</div>

<div class="chart">
<div id="tradingview_chart"></div>
</div>

</div>

<script>

new TradingView.widget({
container_id: "tradingview_chart",
autosize: true,
symbol: "OANDA:XAUUSD",
interval: "15",
timezone: "Asia/Jakarta",
theme: "dark",
style: "1",
locale: "id",
toolbar_bg: "#0b1220",
enable_publishing: false,
hide_top_toolbar: false,
allow_symbol_change: true
});

function setSignal(type){

const box=document.getElementById("signalBox");

box.className="signal";

if(type==="BUY"){
box.classList.add("buy");
box.innerHTML="BUY";
}

else if(type==="SELL"){
box.classList.add("sell");
box.innerHTML="SELL";
}

else{
box.classList.add("wait");
box.innerHTML="WAIT";
}

}

setSignal("WAIT");

</script>

</body>
</html>
